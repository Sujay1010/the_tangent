<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arcGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7B5CF0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9B8CF5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9B8CF5;stop-opacity:0.2" />
      <stop offset="40%" style="stop-color:#7B5CF0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9B8CF5;stop-opacity:0.2" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="100" height="100" fill="#080809" rx="16"/>

  <!-- quadrant arc -->
  <path d="M 20 80 A 60 60 0 0 1 80 20"
        fill="none"
        stroke="url(#arcGrad)"
        stroke-width="3"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- tangent line -->
  <line x1="10" y1="10" x2="90" y2="66"
        stroke="url(#lineGrad)"
        stroke-width="2"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- touch point -->
  <circle cx="50" cy="38" r="3" fill="#fff" opacity="0.9" filter="url(#glow)"/>
  <circle cx="50" cy="38" r="5.5" fill="none" stroke="#7B5CF0" stroke-width="1" opacity="0.5"/>
</svg>
